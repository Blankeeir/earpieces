<!DOCTYPE html>
<html>
<head>
    <title>Firebase Storage Debug</title>
</head>
<body>
    <h1>Firebase Storage Debug</h1>
    <div id="authStatus">Not signed in</div>
    <button onclick="signInWithGoogle()">Sign in with Google</button>
    <br><br>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="testUpload()">Test Upload</button>
    <div id="output"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
        import { getStorage, ref, uploadBytes } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js';

        const firebaseConfig = {
            apiKey: 'AIzaSyC9FI5b0h9XLkv6bEq7eHR-5uHTJdIGifY',
            authDomain: 'earpieces-e9378.firebaseapp.com',
            projectId: 'earpieces-e9378',
            storageBucket: 'earpieces-e9378.firebasestorage.app',
            messagingSenderId: '579487903493',
            appId: '1:579487903493:web:54c67260b5d0ee3937116c'
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            document.getElementById('authStatus').textContent = user ? `Signed in as: ${user.email}` : 'Not signed in';
        });

        window.signInWithGoogle = async function() {
            try {
                await signInWithPopup(auth, provider);
                console.log('Signed in with Google');
            } catch (error) {
                console.error('Sign-in failed:', error);
                document.getElementById('output').innerHTML = `Sign-in failed: ${error.message}`;
            }
        };

        window.testUpload = async function() {
            const fileInput = document.getElementById('fileInput');
            const output = document.getElementById('output');
            
            if (!currentUser) {
                output.innerHTML = 'Please sign in first';
                return;
            }
            
            if (!fileInput.files[0]) {
                output.innerHTML = 'Please select a file';
                return;
            }

            const file = fileInput.files[0];
            const storageRef = ref(storage, `test-uploads/test-${Date.now()}-${file.name}`);
            
            try {
                output.innerHTML = 'Uploading...';
                console.log('Starting upload with config:', {
                    bucket: storage.app.options.storageBucket,
                    fileName: file.name,
                    fileSize: file.size,
                    user: currentUser?.email
                });
                
                const snapshot = await uploadBytes(storageRef, file);
                console.log('Upload successful:', snapshot);
                output.innerHTML = `Upload successful! Path: ${snapshot.ref.fullPath}`;
            } catch (error) {
                console.error('Upload failed:', error);
                output.innerHTML = `Upload failed: ${error.message}`;
            }
        };
    </script>
</body>
</html>
